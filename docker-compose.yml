services:
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_started
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      VECTORFORGE_DATABASE_URL: postgresql+psycopg://vectorforge:vectorforge@postgres:5432/vectorforge
      VECTORFORGE_REDIS_URL: redis://redis:6379/0
      VECTORFORGE_ARTIFACT_ROOT: /app/data/vectorizations
    ports:
      - "8000:8000"
    volumes:
      - vectorforge-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=INFO
    environment:
      VECTORFORGE_DATABASE_URL: postgresql+psycopg://vectorforge:vectorforge@postgres:5432/vectorforge
      VECTORFORGE_REDIS_URL: redis://redis:6379/0
      VECTORFORGE_ARTIFACT_ROOT: /app/data/vectorizations
    volumes:
      - vectorforge-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=INFO
    environment:
      VECTORFORGE_DATABASE_URL: postgresql+psycopg://vectorforge:vectorforge@postgres:5432/vectorforge
      VECTORFORGE_REDIS_URL: redis://redis:6379/0
      VECTORFORGE_ARTIFACT_ROOT: /app/data/vectorizations
    volumes:
      - vectorforge-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vectorforge
      POSTGRES_USER: vectorforge
      POSTGRES_PASSWORD: vectorforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorforge -d vectorforge"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vectorforge-data:
  postgres-data:
